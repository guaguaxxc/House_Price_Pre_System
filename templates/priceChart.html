<!-- 价格区间柱状体 -->
<script>
    var chartDom = document.getElementById('mainOne');
    var myChart = echarts.init(chartDom);
    var option;

    option = {
        tooltip: {
            trigger: 'axis'
        },
        legend: {
            data: ['价格区间']
        },
        toolbox: {
            show: true,
            feature: {
                dataView: {show: true, readOnly: false},
                magicType: {show: true, type: ['line', 'bar']},
                restore: {show: true},
                saveAsImage: {show: true}
            }
        },
        calculable: true,
        xAxis: [
            {
                type: 'category',
                data: {{ X_price | tojson }}
            }
        ],
        yAxis: [
            {
                type: 'value'
            }
        ],
        series: [
            {
                name: '价格区间',
                type: 'bar',
                data: {{ Y_price }},
                markLine: {
                    data: [{type: 'average', name: 'Avg'}]
                },
                animation: true,
                animationDuration: 1000,
                itemStyle: {
                    color: "#ffcc00",
                    shadowColor: "rgba(0,0,0,.5)",
                    shadowBlur: 10
                }
            }
        ]
    };
    option && myChart.setOption(option);
</script>
<!-- 价格与绿化率散点图 -->
<script>
    var scatterChart = echarts.init(document.getElementById('mainTwo'));

    var scatterData = {{ scatter_data|tojson }};
    var axisXMin = {{ axis_x_min }};
    var axisXMax = {{ axis_x_max }};
    var axisYMin = {{ axis_y_min }};
    var axisYMax = {{ axis_y_max }};

    var scatterOption = {
        tooltip: {
            trigger: 'item',
            formatter: function (params) {
                return `${params.name}<br>价格：${params.value[0]} 元/m²<br>绿化率：${params.value[1]} %`;
            }
        },
        xAxis: {
            name: '价格（元/m²）',
            nameLocation: 'middle',
            nameGap: 30,
            type: 'value',
            min: axisXMin,
            max: axisXMax,
            axisLabel: {formatter: '{value}'}
        },
        yAxis: {
            name: '绿化率（%）',
            type: 'value',
            min: axisYMin,
            max: axisYMax,
            axisLabel: {formatter: '{value} %'}
        },
        series: [{
            type: 'scatter',
            data: scatterData,  // 直接使用后端传的散点数据
            symbolSize: 10,     // 散点大小
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    {offset: 0, color: '#67C23A'}, // 渐变起始色
                    {offset: 1, color: '#81C784'}  // 渐变结束色
                ]),
                borderColor: '#4CAF50',
                borderWidth: 1
            },
            animation: true,
            animationDuration: 1000,
        }]
    };

    // 渲染散点图
    scatterChart.setOption(scatterOption);
</script>
<script>
    var chartDom = document.getElementById('mainThree');
    var myChart = echarts.init(chartDom);
    var option;
    option = {
        tooltip: {
            trigger: 'axis'
        },
        legend: {
            data: ['竣工时间与价格']
        },
        toolbox: {
            show: true,
            feature: {
                dataView: {show: true, readOnly: false},
                magicType: {show: true, type: ['line', 'bar']},
                restore: {show: true},
                saveAsImage: {show: true}
            }
        },
        calculable: true,
        xAxis: [
            {
                type: 'category',
                data: {{line_x|tojson}},
                name: '竣工年份',
                nameLocation: 'end',
                nameGap: 20
            }
        ],
        yAxis: [
            {
                type: 'value',
                name: '平均价格（元/m²）',
                nameLocation: 'end',
                nameGap: 15
            }
        ],
        series: [
            {
                name: '平均房价',
                type: 'line',
                data: {{ line_y|tojson }},
                markLine: {
                    data: [{type: 'average', name: 'Avg'}]
                },
                smooth: true,
                lineStyle: {
                    with: 2,
                    shadowColor: "rgba(0,0,0,.5)",
                    shadowBlur: 10
                },
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 1, 1, [
                        {
                            offset: 0,
                            color: "rgb(255,70,131)"
                        },
                        {
                            offset: 1,
                            color: "rgb(180,10,50)"
                        }
                    ])
                },
                symbol: "circle",
                symbolSize: 10,
                emphasis: {
                    itemStyle: {
                        borderColor: "rgba(255,255,255,.8)",
                        borderWidth: 4
                    },
                    label: {
                        show: true,
                        color: "rgba(0,0,0,0.5)",
                        fontsize: 16,
                        formatter: "{c}"
                    },
                    animation: true,
                    animationDuration: 1000,
                }
            },
        ]
    }
    ;
    option && myChart.setOption(option);
</script>
