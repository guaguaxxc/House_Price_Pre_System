<!-- 1. 区域热力图 -->
<script>
    // ========== 1. 初始化地图实例（复用你的风格） ==========
    var priceChart = echarts.init(document.getElementById('mainOne'));
    var saleChart = echarts.init(document.getElementById('mainTwo'));

    // ========== 2. 绑定后端统计数据（替换为你的模板渲染） ==========
    var provincePriceData = {{ province_price_data|tojson }}; // 各省平均房价
    var provinceSaleData = {{ province_sale_data|tojson }};   // 各省在售房源总数

    // ========== 3. 通用地图配置函数（复用逻辑） ==========
    function initMapOption(title, data, unit, colorRange) {
        return {
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    return `${params.name}<br/>${title}：${params.value} ${unit}`;
                }
            },
            // 颜色深浅映射数值大小
            visualMap: {
                min: Math.min(...data.map(item => item.value) || [0]),
                max: Math.max(...data.map(item => item.value) || [100]),
                left: 'bottom',
                top: 'bottom',
                text: ['高', '低'],
                inRange: {color: colorRange},
                calculable: true // 允许拖拽调整范围
            },
            series: [{
                name: title,
                type: 'map',
                mapType: 'china', // 中国省级地图
                roam: true, // 支持缩放/拖拽
                label: {
                    show: true, // 显示省份名称
                    fontSize: 11
                },
                emphasis: {
                    label: {color: '#fff'},
                    itemStyle: {areaColor: '#ff4500'} // 悬浮高亮色
                },
                data: data
            }]
        };
    }

    // ========== 4. 配置并渲染双地图 ==========
    // ① 各省平均房价地图（红渐变：浅→深=房价低→高）
    var priceOption = initMapOption(
        '平均房价',
        provincePriceData,
        '元/㎡',
        ['#fff5e6', '#ffcc99', '#ff9966', '#ff6633', '#e64a19']
    );
    // ② 各省在售房源总数地图（绿渐变：浅→深=数量少→多）
    var saleOption = initMapOption(
        '在售房源总数',
        provinceSaleData,
        '套',
        ['#e6f7e6', '#b3e0b3', '#80cc80', '#4dba4d', '#2e8b57']
    );

    // 渲染地图（复用你的判断逻辑）
    priceOption && priceChart.setOption(priceOption);
    saleOption && saleChart.setOption(saleOption);

    // ========== 5. 窗口自适应 ==========
    window.addEventListener('resize', function () {
        priceChart.resize();
        saleChart.resize();
    });
</script>
<!-- 2. 在售/在租双柱状图 -->
<script>
    // ========== 1. 初始化图表实例 ==========
    var chartDom = document.getElementById('mainThree');
    var myChart = echarts.init(chartDom);
    var option;

    // ========== 2. 绑定后端统计数据（替换为模板变量） ==========
    var regions = {{ regions|tojson }};       // 七大区域：["东北","华北",...]
    var saleData = {{ sale_data|tojson }};   // 在售房源总数
    var rentData = {{ rent_data|tojson }};   // 在租房源总数

    // ========== 3. 双轴柱状图配置 ==========
    option = {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' }, // 鼠标悬浮显示阴影提示
            formatter: function(params) {
                // 自定义tooltip格式：区域 + 在售 + 在租
                let region = params[0].name;
                let sale = params[0].value;
                let rent = params[1].value;
                return `${region}<br/>在售房源：${sale} 套<br/>在租房源：${rent} 套`;
            }
        },
        legend: {
            data: ['在售房源', '在租房源'],
            top: 30 // 图例位置
        },
        grid: {
            left: '5%',
            right: '10%', // 给右Y轴留空间
            bottom: '8%',
            top: '15%',
            containLabel: true
        },
        // X轴：七大区域
        xAxis: {
            type: 'category',
            data: regions,
            axisLabel: { fontSize: 12 }
        },
        // 双Y轴配置
        yAxis: [
            {
                // 左Y轴：在售房源
                type: 'value',
                name: '在售房源（套）',
                nameTextStyle: { color: '#5470c6' },
                axisLine: { lineStyle: { color: '#5470c6' } },
                axisLabel: {
                    formatter: '{value}',
                    color: '#5470c6'
                }
            },
            {
                // 右Y轴：在租房源
                type: 'value',
                name: '在租房源（套）',
                nameTextStyle: { color: '#ee6666' },
                axisLine: { lineStyle: { color: '#ee6666' } },
                axisLabel: {
                    formatter: '{value}',
                    color: '#ee6666'
                },
                // 与左Y轴分离，显示在右侧
                position: 'right',
                offset: 0 // 偏移量
            }
        ],
        // 系列数据：双柱状图
        series: [
            {
                name: '在售房源',
                type: 'bar',
                yAxisIndex: 0, // 绑定左Y轴
                data: saleData,
                itemStyle: { color: '#5470c6' }, // 蓝色系
                barWidth: '40%' // 柱子宽度
            },
            {
                name: '在租房源',
                type: 'bar',
                yAxisIndex: 1, // 绑定右Y轴
                data: rentData,
                itemStyle: { color: '#ee6666' }, // 红色系
                barWidth: '40%'
            }
        ]
    };

    // ========== 4. 渲染图表 + 自适应 ==========
    option && myChart.setOption(option);
    window.addEventListener('resize', function() {
        myChart.resize();
    });
</script>
