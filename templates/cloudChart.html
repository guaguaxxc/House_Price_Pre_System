<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<script src="/static/js/buttons.bootstrap4.min.js"></script>
<script src="/static/js/jszip.min.js"></script>
<script src="/static/js/buttons.html5.min.js"></script>
<script src="/static/js/buttons.print.min.js"></script>
<script src="/static/js/buttons.colVis.min.js"></script>
<script src="/static/js/dataTables.responsive.min.js"></script>
<script src="/static/js/responsive.bootstrap4.min.js"></script>
<script src="/static/js/datatables.init.js"></script>
<script src="/static/js/app.js"></script>
<script>
    // 等待DOM加载完成
    document.addEventListener('DOMContentLoaded', function () {
        // ========== 1. 校验容器是否存在 ==========
        const commDom = document.getElementById('mainOne');
        const propertyDom = document.getElementById('mainTwo');
        if (!commDom || !propertyDom) {
            console.error('词云容器未找到！');
            return;
        }

        // ========== 2. 绑定后端词云数据（替换为模板变量） ==========
        const commWordData = {{ comm_wordcloud|tojson }} || []; // 小区名数据
        const propertyWordData = {{ property_wordcloud|tojson }} || []; // 物业公司数据

        // ========== 3. 通用词云配置函数 ==========
        function getWordcloudOptionOne(data) {
            return {
                tooltip: {
                    trigger: 'item',
                    formatter: (params) => `${params.name}：出现${params.value}次`
                },
                series: [{
                    type: 'wordCloud', // 词云类型
                    gridSize: 5, // 词之间的间距
                    sizeRange: [12, 50], // 词大小范围（px）
                    rotationRange: [-45, 45], // 旋转角度范围
                    rotationStep: 45, // 旋转步长
                    shape: 'triangle', // 词云形状（circle/rect/triangle等）
                    width: '100%', // 词云宽度
                    height: '100%', // 词云高度
                    drawOutOfBound: false, // 不绘制到容器外
                    textStyle: {
                        fontFamily: 'Microsoft YaHei', // 适配中文显示
                        fontWeight: 'bold',
                        // 随机颜色（区分不同词）
                        color: function () {
                            return 'rgb(' + [
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160)
                            ].join(',') + ')';
                        }
                    },
                    emphasis: {
                        textStyle: {
                            color: '#fff', // 悬浮时文字白色
                            shadowBlur: 10, // 悬浮阴影
                            shadowColor: '#000'
                        }
                    },
                    data: data // 词云数据
                }]
            };
        }

        function getWordcloudOptionTwo(data) {
            return {
                tooltip: {
                    trigger: 'item',
                    formatter: (params) => `${params.name}：出现${params.value}次`
                },
                series: [{
                    type: 'wordCloud', // 词云类型
                    gridSize: 5, // 词之间的间距
                    sizeRange: [12, 50], // 词大小范围（px）
                    rotationRange: [-45, 45], // 旋转角度范围
                    rotationStep: 45, // 旋转步长
                    shape: 'rect', // 词云形状（circle/rect/triangle等）
                    width: '100%', // 词云宽度
                    height: '100%', // 词云高度
                    drawOutOfBound: false, // 不绘制到容器外
                    textStyle: {
                        fontFamily: 'Microsoft YaHei', // 适配中文显示
                        fontWeight: 'bold',
                        // 随机颜色（区分不同词）
                        color: function () {
                            return 'rgb(' + [
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160)
                            ].join(',') + ')';
                        }
                    },
                    emphasis: {
                        textStyle: {
                            color: '#fff', // 悬浮时文字白色
                            shadowBlur: 10, // 悬浮阴影
                            shadowColor: '#000'
                        }
                    },
                    data: data // 词云数据
                }]
            };
        }

        // ========== 4. 初始化并渲染双词云 ==========
        // 小区名词云
        const commChart = echarts.init(commDom);
        commChart.setOption(getWordcloudOptionOne(commWordData));

        // 物业公司词云
        const propertyChart = echarts.init(propertyDom);
        propertyChart.setOption(getWordcloudOptionTwo(propertyWordData));

        // ========== 5. 窗口自适应 ==========
        window.addEventListener('resize', function () {
            commChart.resize();
            propertyChart.resize();
        });
    });
</script>
