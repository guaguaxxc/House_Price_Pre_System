    <div class="main-content">
        <div class="page-content">
            <!-- Page-Title -->
            <div class="page-title-box">
                <div class="container-fluid">
                    <div class="row align-items-center">
                        <div class="col-md-8">
                            <h4 class="page-title mb-1">添加房屋数据</h4>
                            <ol class="breadcrumb m-0">
                                <li class="breadcrumb-item"><a href="/page/home">首页</a></li>
                                <li class="breadcrumb-item active">添加房屋数据</li>
                            </ol>
                        </div>
                    </div>

                </div>
            </div>
            <div class="page-content-wrapper">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body">
                                    <h4 class="header-title">房屋数据添加操作</h4>
                                    <p class="card-title-desc">可自定义对房屋进行添加（按要求完成表单，即可正常添加）</p>
                                    <form action="/page/addHouse" class="form-sample" method="POST">
                                        <!-- 添加 CSRF token -->
                                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                                        <!-- 基础信息 -->
                                        <div class="form-group">
                                            <label for="city">城市 <span style="color:red">*</span></label>
                                            <input name="city" type="text" autocomplete="off" class="form-control"
                                                   id="city" placeholder="请输入城市（如：北京市）" required>
                                        </div>
                                        <div class="form-group">
                                            <label for="community_name">小区名称 <span
                                                    style="color:red">*</span></label>
                                            <input name="community_name" type="text" autocomplete="off"
                                                   class="form-control" id="community_name"
                                                   placeholder="请输入小区全称（如：望京SOHO）" required>
                                        </div>
                                        <!-- 价格（自动加 元/㎡） -->
                                        <div class="form-group">
                                            <label for="price">价格 <span style="color:red">*</span></label>
                                            <div class="input-group">
                                                <input name="price" type="number" step="0.01" autocomplete="off"
                                                       class="form-control" id="price"
                                                       placeholder="请输入价格（纯数字，单位：元/㎡）" required>
                                                <div class="input-group-append">
                                                    <span class="input-group-text">元/㎡</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label for="address">地址</label>
                                            <input name="address" type="text" autocomplete="off" class="form-control"
                                                   id="address" placeholder="请输入详细地址">
                                        </div>
                                        <!-- 物业相关信息 -->
                                        <div class="form-group">
                                            <label for="property_type">物业类型</label>
                                            <select name="property_type" class="form-control" id="property_type">
                                                <option value="">请选择物业类型</option>
                                                <option value="住宅">住宅</option>
                                                <option value="公寓">公寓</option>
                                                <option value="商铺">商铺</option>
                                                <option value="写字楼">写字楼</option>
                                                <option value="别墅">别墅</option>
                                                <option value="其他">其他</option>
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label for="ownership_type">权属类别</label>
                                            <input name="ownership_type" type="text" autocomplete="off"
                                                   class="form-control" id="ownership_type"
                                                   placeholder="请输入权属类别（如：商品房、回迁房、经济适用房）">
                                        </div>
                                        <div class="form-group">
                                            <label for="completion_time">竣工时间</label>
                                            <input name="completion_time" type="text" autocomplete="off"
                                                   class="form-control" id="completion_time"
                                                   placeholder="请输入竣工时间（如：2010年、2015-06）">
                                        </div>
                                        <div class="form-group">
                                            <label for="property_right_years">产权年限</label>
                                            <input name="property_right_years" type="text" autocomplete="off"
                                                   class="form-control" id="property_right_years"
                                                   placeholder="请输入产权年限（如：70年、40年）">
                                        </div>
                                        <!-- 小区规模信息 -->
                                        <!-- 总户数（自动加 户） -->
                                        <div class="form-group">
                                            <label for="total_households">总户数</label>
                                            <div class="input-group">
                                                <input name="total_households" type="number" autocomplete="off"
                                                       class="form-control" id="total_households"
                                                       placeholder="请输入总户数（纯数字，单位：户）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">户</span>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 总建筑面积（自动加 ㎡） -->
                                        <div class="form-group">
                                            <label for="total_building_area">总建筑面积</label>
                                            <div class="input-group">
                                                <input name="total_building_area" type="number" step="0.01"
                                                       autocomplete="off" class="form-control" id="total_building_area"
                                                       placeholder="请输入总建筑面积（纯数字，单位：㎡）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">㎡</span>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 容积率（纯数字，无单位） -->
                                        <div class="form-group">
                                            <label for="plot_ratio">容积率</label>
                                            <input name="plot_ratio" type="number" step="0.01" autocomplete="off"
                                                   class="form-control" id="plot_ratio"
                                                   placeholder="请输入容积率（纯数字）">
                                        </div>
                                        <!-- 绿化率（自动加 %） -->
                                        <div class="form-group">
                                            <label for="greening_rate">绿化率</label>
                                            <div class="input-group">
                                                <input name="greening_rate" type="number" step="0.01" autocomplete="off"
                                                       class="form-control" id="greening_rate"
                                                       placeholder="请输入绿化率（纯数字，单位：%）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">%</span>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 建筑与配套信息 -->
                                        <div class="form-group">
                                            <label for="building_type">建筑类型</label>
                                            <input name="building_type" type="text" autocomplete="off"
                                                   class="form-control" id="building_type"
                                                   placeholder="请输入建筑类型（如：板楼、塔楼、板塔结合）">
                                        </div>
                                        <div class="form-group">
                                            <label for="business_district">所属商圈</label>
                                            <input name="business_district" type="text" autocomplete="off"
                                                   class="form-control" id="business_district"
                                                   placeholder="请输入所属商圈（如：望京商圈、中关村商圈）">
                                        </div>
                                        <div class="form-group">
                                            <label for="unified_heating">统一供暖</label>
                                            <select name="unified_heating" class="form-control" id="unified_heating">
                                                <option value="">请选择是否统一供暖</option>
                                                <option value="是">是</option>
                                                <option value="否">否</option>
                                                <option value="自采暖">自采暖</option>
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label for="water_supply_power">供水供电</label>
                                            <select name="water_supply_power" class="form-control"
                                                    id="water_supply_power">
                                                <option value="">请选择供水供电</option>
                                                <option value="民水民电">民水民电</option>
                                                <option value="商水商电">商水商电</option>
                                            </select>
                                        </div>
                                        <!-- 停车与物业费用 -->
                                        <div class="form-group">
                                            <label for="parking_spaces">停车位</label>
                                            <input name="parking_spaces" type="text" autocomplete="off"
                                                   class="form-control" id="parking_spaces"
                                                   placeholder="请输入停车位信息（如：1:1.2、地上车位500个）">
                                        </div>
                                        <!-- 物业费（自动加 元/㎡·月） -->
                                        <div class="form-group">
                                            <label for="property_fee">物业费</label>
                                            <div class="input-group">
                                                <input name="property_fee" type="number" step="0.01" autocomplete="off"
                                                       class="form-control" id="property_fee"
                                                       placeholder="请输入物业费（纯数字，单位：元/㎡·月）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">元/㎡·月</span>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- 停车费（自动加 元/月） -->
                                        <div class="form-group">
                                            <label for="parking_fee">停车费</label>
                                            <div class="input-group">
                                                <input name="parking_fee" type="number" step="0.01" autocomplete="off"
                                                       class="form-control" id="parking_fee"
                                                       placeholder="请输入停车费（纯数字，单位：元/月）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">元/月</span>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- 车位管理费（自动加 元/月） -->
                                        <div class="form-group">
                                            <label for="parking_management_fee">车位管理费</label>
                                            <div class="input-group">
                                                <input name="parking_management_fee" type="number" step="0.01"
                                                       autocomplete="off" class="form-control"
                                                       id="parking_management_fee"
                                                       placeholder="请输入车位管理费（纯数字，单位：元/月）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">元/月</span>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 其他信息 -->
                                        <div class="form-group">
                                            <label for="property_company">物业公司</label>
                                            <input name="property_company" type="text" autocomplete="off"
                                                   class="form-control" id="property_company"
                                                   placeholder="请输入物业公司名称">
                                        </div>
                                        <div class="form-group">
                                            <label for="community_address">小区地址</label>
                                            <input name="community_address" type="text" autocomplete="off"
                                                   class="form-control" id="community_address"
                                                   placeholder="请输入小区具体地址">
                                        </div>
                                        <div class="form-group">
                                            <label for="developer">开发商</label>
                                            <input name="developer" type="text" autocomplete="off" class="form-control"
                                                   id="developer" placeholder="请输入开发商名称">
                                        </div>
                                        <!-- 在售房源（自动加 套） -->
                                        <div class="form-group">
                                            <label for="sale_houses">在售房源</label>
                                            <div class="input-group">
                                                <input name="sale_houses" type="number" autocomplete="off"
                                                       class="form-control" id="sale_houses"
                                                       placeholder="请输入在售房源数量（纯数字，单位：套）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">套</span>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- 在租房源（自动加 套） -->
                                        <div class="form-group">
                                            <label for="rent_houses">在租房源</label>
                                            <div class="input-group">
                                                <input name="rent_houses" type="number" autocomplete="off"
                                                       class="form-control" id="rent_houses"
                                                       placeholder="请输入在租房源数量（纯数字，单位：套）">
                                                <div class="input-group-append">
                                                    <span class="input-group-text">套</span>
                                                </div>
                                            </div>
                                        </div>
                                        <!-- 提交按钮 -->
                                        <button type="submit" class="btn btn-primary">提交小区信息</button>
                                        <button type="reset" class="btn btn-default ml-2">重置表单</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
