<!-- 矩形树图与旭日图 -->
<script>
    var chartDom = document.getElementById('mainOne');
    var myChartOne = echarts.init(chartDom);
    var option;

    const typeColorMap = {
        "仓储": "#67C23A",
        "住宅": "#FF9800",
        "公寓": "#E6A23C",
        "其他": "#909399",
        "别墅": "#722ED1",
        "商业": "#409EFF",
        "商住楼": "#13C2C2",
        "联列住宅": "#F56C6C",
        "自建房": "#5CDBD3",
        "酒店": "#FA8C16"
    };

    const mapData = {{map_data|tojson}};
    if (mapData && mapData.children && Array.isArray(mapData.children)) {
        mapData.children.forEach(item => {
            const color = typeColorMap[item.name] || '#8C8C8C';
            item.itemStyle = {
                color: color,
                borderWidth: item.itemStyle?.borderWidth || 1,
                borderColor: item.itemStyle?.borderColor || 'rgba(255,255,255,.5)'
            };
        });
    }

    const treemapOption = {
        tooltip: {
            trigger: 'item',
            formatter: function (params) {
                // 计算总数量
                const total = mapData.children.reduce((sum, item) => sum + item.value, 0);
                // 计算占比（保留2位小数）
                const percent = ((params.value / total) * 100).toFixed(2);
                return `${params.name}<br/>数量：${params.value} 条<br/>占比：${percent}%`;
            },
            textStyle: {fontSize: 12},
            borderWidth: 1
        },
        series: [
            {
                type: 'treemap',
                id: 'echarts-package-size',
                animationDurationUpdate: 1000,
                roam: false,
                nodeClick: undefined,
                data: [mapData],
                universalTransition: true,
                label: {
                    show: true
                },
                breadcrumb: {
                    show: false
                }
            }
        ]
    };

    const sunburstOption = {
        tooltip: {
            trigger: 'item',
            formatter: function (params) {
                // 计算总数量
                const total = mapData.children.reduce((sum, item) => sum + item.value, 0);
                // 计算占比（保留2位小数）
                const percent = ((params.value / total) * 100).toFixed(2);
                return `${params.name}<br/>数量：${params.value} 条<br/>占比：${percent}%`;
            },
            textStyle: {fontSize: 12},
            borderWidth: 1
        },
        series: [
            {
                type: 'sunburst',
                id: 'echarts-package-size',
                radius: ['20%', '90%'],
                animationDurationUpdate: 1000,
                nodeClick: undefined,
                // 核心修改1：直接传入子节点数组，跳过根节点
                data: mapData.children || [],
                universalTransition: true,
                itemStyle: {
                    borderWidth: 1,
                    borderColor: 'rgba(255,255,255,.5)'
                },
                label: {
                    show: false
                },
                rootNode: {
                    label: {show: false},
                    itemStyle: {color: 'transparent'}
                }
            }
        ]
    };

    let currentOption = treemapOption;
    myChartOne.setOption(currentOption);
    setInterval(function () {
        currentOption =
            currentOption === treemapOption ? sunburstOption : treemapOption;
        myChartOne.setOption(currentOption);
    }, 3000);
</script>
<!-- 绿化率面积折线图 -->
<script>
    var chartDom = document.getElementById('mainTwo');
    var myChart = echarts.init(chartDom);
    var option;
    option = {
        tooltip: {
            trigger: 'axis'
        },
        xAxis: {
            type: 'category',
            boundaryGap: false,
            data: {{ X_green | tojson }},
            // ========== 新增：X轴名称 + 样式 ==========
            name: '绿化率区间',        // X轴名称
            nameLocation: 'center',    // 名称位置（居中）
            nameGap: 30,               // 名称与轴线的间距（像素）
            nameTextStyle: {           // 名称样式（可选，优化显示）
                fontSize: 14,          // 字体大小
                color: '#333',         // 字体颜色
                fontWeight: 'bold'     // 加粗
            }
        },
        yAxis: {
            type: 'value',
            // ========== 新增：Y轴名称 + 样式 ==========
            name: '楼盘数量',          // Y轴名称
            nameLocation: 'middle',    // 名称位置（垂直居中）
            nameGap: 40,               // 名称与轴线的间距（像素）
            nameTextStyle: {           // 名称样式（可选，优化显示）
                fontSize: 14,
                color: '#333',
                fontWeight: 'bold'
            },
            // 可选：Y轴最小值设为0，面积图展示更合理
            min: 0
        },
        series: [
            {
                data: {{ Y_green | tojson }},
                type: 'line',
                areaStyle: {},
                // 可选：优化折线/面积样式（非必需，仅提升视觉效果）
                smooth: true,          // 折线平滑
                itemStyle: { color: '#67C23A' }, // 折线颜色
                areaStyle: { color: 'rgba(103, 194, 58, 0.3)' } // 面积填充色
            }
        ]
    };

    option && myChart.setOption(option);
</script>
